name: Apply focused capacity UI patch

on:
  push:
    branches:
      - feature/focused-demand-leadtime-charts

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[focused-patch]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/focused-demand-leadtime-charts
      - name: Apply focused UI changes
        run: |
          python - <<'PY'
          from pathlib import Path

          p = Path('platform/apps/web/src/AnalysisExplorer.tsx')
          s = p.read_text()

          s = s.replace(
          '''  onBack: () => void;\n  onContinue: () => void;\n}''',
          '''  onBack: () => void;\n  onContinue: () => void;\n  onModelChange: (model: CapacityModel) => void;\n  onRecalculate: () => Promise<void>;\n}''')

          marker = '''function GapBarChart({ labels, baseline, recovery }: { labels: string[]; baseline: number[]; recovery?: number[] }) {'''
          combo = r'''
function LoadCapacityComboChart({ labels, baselineLoad, baselineCapacity, recoveryLoad, recoveryCapacity }: { labels: string[]; baselineLoad: number[]; baselineCapacity: number[]; recoveryLoad?: Array<number | null>; recoveryCapacity?: Array<number | null> }) {
  const width = 980, height = 340, margin = { top: 24, right: 28, bottom: 58, left: 72 };
  const plotWidth = width - margin.left - margin.right, plotHeight = height - margin.top - margin.bottom;
  const finite = [...baselineLoad, ...baselineCapacity, ...(recoveryLoad ?? []), ...(recoveryCapacity ?? [])].filter((value): value is number => value !== null && Number.isFinite(value));
  if (labels.length === 0 || finite.length === 0) return <div className="chart-empty">No capacity data is available for this selection.</div>;
  const maximum = Math.max(1, ...finite) * 1.08;
  const y = (value: number) => margin.top + plotHeight - value / maximum * plotHeight;
  const groupWidth = plotWidth / Math.max(labels.length, 1), barWidth = Math.max(5, Math.min(26, groupWidth * (recoveryLoad ? .3 : .5)));
  const xCenter = (index: number) => margin.left + groupWidth * index + groupWidth / 2;
  const path = (values: Array<number | null>) => values.map((value, index) => value === null ? null : `${index === 0 ? "M" : "L"}${xCenter(index)},${y(value)}`).filter(Boolean).join(" ");
  const tickIndexes = labels.map((_, index) => index).filter(index => labels.length <= 12 || index % Math.ceil(labels.length / 10) === 0 || index === labels.length - 1);
  return <div className="chart-frame"><svg viewBox={`0 0 ${width} ${height}`} role="img" aria-label="Load bars and capacity lines by period">
    {[0, .25, .5, .75, 1].map(fraction => { const value = maximum * fraction; return <g key={fraction}><line className="chart-grid" x1={margin.left} x2={width - margin.right} y1={y(value)} y2={y(value)} /><text className="chart-axis-label" x={margin.left - 10} y={y(value) + 4} textAnchor="end">{formatNumber(value)}</text></g>; })}
    {baselineLoad.map((value, index) => <rect key={`bl-${index}`} className="combo-load-bar baseline" x={xCenter(index) - (recoveryLoad ? barWidth : barWidth / 2)} y={y(value)} width={barWidth} height={Math.max(1, margin.top + plotHeight - y(value))}><title>{`${labels[index]} · Baseline load: ${formatNumber(value)}`}</title></rect>)}
    {recoveryLoad?.map((value, index) => value === null ? null : <rect key={`rl-${index}`} className="combo-load-bar recovery" x={xCenter(index) + 2} y={y(value)} width={barWidth} height={Math.max(1, margin.top + plotHeight - y(value))}><title>{`${labels[index]} · Recovery load: ${formatNumber(value)}`}</title></rect>)}
    <path d={path(baselineCapacity)} className="combo-capacity-line baseline" />
    {baselineCapacity.map((value, index) => <circle key={`bc-${index}`} className="combo-capacity-point baseline" cx={xCenter(index)} cy={y(value)} r="3" />)}
    {recoveryCapacity ? <><path d={path(recoveryCapacity)} className="combo-capacity-line recovery" />{recoveryCapacity.map((value, index) => value === null ? null : <circle key={`rc-${index}`} className="combo-capacity-point recovery" cx={xCenter(index)} cy={y(value)} r="3" />)}</> : null}
    {tickIndexes.map(index => <text key={index} className="chart-x-label" x={xCenter(index)} y={height - 22} textAnchor="middle">{labels[index]}</text>)}
  </svg><div className="chart-legend"><span><i className="combo-legend baseline-load" />Demand / load</span><span><i className="combo-legend baseline-capacity" />Available capacity</span>{recoveryLoad ? <span><i className="combo-legend recovery-load" />Recovery load</span> : null}{recoveryCapacity ? <span><i className="combo-legend recovery-capacity" />Recovery capacity</span> : null}</div></div>;
}

'''
          s = s.replace(marker, combo + marker)

          start = s.index('function DemandExplorer(')
          end = s.index('\nfunction LeadTimeExplorer(', start)
          demand = r'''function DemandExplorer({ model, scenarioId, resolution, onModelChange, onRecalculate }: { model: CapacityModel; scenarioId: string; resolution: ExploreResolution; onModelChange: (model: CapacityModel) => void; onRecalculate: () => Promise<void> }) {
  const [productId, setProductId] = useState("all");
  const [dirty, setDirty] = useState(false);
  const records = model.demand.filter(record => record.scenarioId === scenarioId).filter(record => productId === "all" || record.productId === productId).sort((a, b) => a.shipDate.localeCompare(b.shipDate));
  const grouped = new Map<string, { label: string; quantity: number }>();
  for (const record of records) { const target = demandBucket(record.shipDate, resolution); const current = grouped.get(target.key) ?? { label: target.label, quantity: 0 }; current.quantity += record.quantity; grouped.set(target.key, current); }
  const points = [...grouped.entries()].sort(([a], [b]) => a.localeCompare(b)).map(([, value]) => value);
  function updateDemand(id: string, field: "productId" | "shipDate" | "quantity", value: string | number) { onModelChange({ ...model, demand: model.demand.map(record => record.id === id ? { ...record, [field]: value } : record) }); setDirty(true); }
  function addDemand() { const product = productId === "all" ? model.products[0]?.id : productId; if (!product) return; onModelChange({ ...model, demand: [...model.demand, { id: `demand-${crypto.randomUUID()}`, scenarioId, productId: product, shipDate: model.horizonStart, quantity: 0, demandClass: "forecast", sourceSystem: "Assessment Studio edit" }] }); setDirty(true); }
  function removeDemand(id: string) { onModelChange({ ...model, demand: model.demand.filter(record => record.id !== id) }); setDirty(true); }
  return <>
    <div className="explorer-subfilters"><label>Product<select value={productId} onChange={event => setProductId(event.target.value)}><option value="all">All products</option>{model.products.map(product => <option key={product.id} value={product.id}>{product.name}</option>)}</select></label><div className="editor-actions"><button className="secondary" type="button" onClick={addDemand}>Add demand row</button><button className="primary" type="button" disabled={!dirty} onClick={() => void onRecalculate().then(() => setDirty(false))}>Apply and recalculate</button></div></div>
    <div className="analysis-card wide"><div className="analysis-card-heading"><div><h3>Shipment demand profile</h3><p>Demand is shown as bars at ship date. Capacity load is shifted earlier by the lead-time model.</p></div></div><DemandBarChart labels={points.map(point => point.label)} values={points.map(point => point.quantity)} /></div>
    <div className="table-card demand-editor"><div className="card-title-row"><div><h3>Imported demand detail</h3><small>Review and modify product, ship date, and quantity before recalculating.</small></div></div><div className="table-wrap"><table><thead><tr><th>Product</th><th>Ship date</th><th className="number">Quantity</th><th>Class</th><th /></tr></thead><tbody>{records.map(record => <tr key={record.id}><td><select value={record.productId} onChange={event => updateDemand(record.id, "productId", event.target.value)}>{model.products.map(product => <option key={product.id} value={product.id}>{product.name}</option>)}</select></td><td><input type="date" value={record.shipDate} onChange={event => updateDemand(record.id, "shipDate", event.target.value)} /></td><td><input className="number-input" type="number" min="0" step="1" value={record.quantity} onChange={event => updateDemand(record.id, "quantity", Number(event.target.value))} /></td><td>{record.demandClass ?? "forecast"}</td><td><button className="text-danger" type="button" onClick={() => removeDemand(record.id)}>Remove</button></td></tr>)}</tbody></table></div></div>
  </>;
}

function DemandBarChart({ labels, values }: { labels: string[]; values: number[] }) {
  const width = 980, height = 300, margin = { top: 20, right: 24, bottom: 54, left: 64 };
  const plotWidth = width - margin.left - margin.right, plotHeight = height - margin.top - margin.bottom;
  const max = Math.max(1, ...values) * 1.08, group = plotWidth / Math.max(labels.length, 1), bar = Math.max(6, Math.min(42, group * .65));
  const y = (value: number) => margin.top + plotHeight - value / max * plotHeight;
  return <div className="chart-frame"><svg viewBox={`0 0 ${width} ${height}`} role="img" aria-label="Shipment demand bar chart">{[0,.25,.5,.75,1].map(f => <g key={f}><line className="chart-grid" x1={margin.left} x2={width-margin.right} y1={y(max*f)} y2={y(max*f)} /><text className="chart-axis-label" x={margin.left-8} y={y(max*f)+4} textAnchor="end">{Math.round(max*f)}</text></g>)}{values.map((value,index) => <rect key={index} className="demand-bar" x={margin.left+group*index+(group-bar)/2} y={y(value)} width={bar} height={Math.max(1, margin.top+plotHeight-y(value))}><title>{`${labels[index]} · ${value}`}</title></rect>)}{labels.map((label,index) => <text key={label} className="chart-x-label" x={margin.left+group*index+group/2} y={height-20} textAnchor="middle">{label}</text>)}</svg></div>;
}
'''
          s = s[:start] + demand + s[end:]

          s = s.replace('function LeadTimeExplorer({ model }: { model: CapacityModel }) {', 'function LeadTimeExplorer({ model, onModelChange, onRecalculate }: { model: CapacityModel; onModelChange: (model: CapacityModel) => void; onRecalculate: () => Promise<void> }) {\n  const [dirty, setDirty] = useState(false);')
          lead_marker = '  const resourceNames = Object.fromEntries(model.resourceGroups.map(group => [group.id, group.name]));\n'
          lead_insert = r'''  const resourceNames = Object.fromEntries(model.resourceGroups.map(group => [group.id, group.name]));
  function updatePhase(phaseId: string, field: "name" | "startWeeksBeforeShip" | "endWeeksBeforeShip" | "allocation", value: string | number) { onModelChange({ ...model, routingRevisions: model.routingRevisions.map(item => item.id === revision.id ? { ...item, phases: item.phases.map(phase => phase.id === phaseId ? { ...phase, [field]: value } : phase) } : item) }); setDirty(true); }
'''
          s = s.replace(lead_marker, lead_insert)
          target = '<div className="explorer-subfilters"><label>Product<select value={productId} onChange={event => setProductId(event.target.value)}>{model.products.map(item => <option key={item.id} value={item.id}>{item.name}</option>)}</select></label><div className="route-meta"><span>Revision</span><strong>{revision.revision}</strong><span>Effective</span><strong>{revision.effectiveFrom}</strong></div></div>'
          repl = '<div className="explorer-subfilters"><label>Product<select value={productId} onChange={event => setProductId(event.target.value)}>{model.products.map(item => <option key={item.id} value={item.id}>{item.name}</option>)}</select></label><div className="route-meta"><span>Revision</span><strong>{revision.revision}</strong><span>Effective</span><strong>{revision.effectiveFrom}</strong></div><button className="primary" type="button" disabled={!dirty} onClick={() => void onRecalculate().then(() => setDirty(false))}>Apply and recalculate</button></div>'
          s = s.replace(target, repl)
          route_table = '<div className="table-card route-table"><div className="card-title-row"><div><h3>Routing and resource detail</h3><small>Operations are sparse; only applicable resources appear.</small></div></div>'
          phase_editor = r'''<div className="table-card leadtime-editor"><div className="card-title-row"><div><h3>Lead-time phase settings</h3><small>Modify timing and allocation, then recalculate to shift load.</small></div></div><div className="table-wrap"><table><thead><tr><th>Phase</th><th className="number">Start weeks before ship</th><th className="number">End weeks before ship</th><th>Allocation</th></tr></thead><tbody>{phases.map(phase => <tr key={phase.id}><td><input value={phase.name} onChange={event => updatePhase(phase.id, "name", event.target.value)} /></td><td><input className="number-input" type="number" min="0" step="1" value={phase.startWeeksBeforeShip} onChange={event => updatePhase(phase.id, "startWeeksBeforeShip", Number(event.target.value))} /></td><td><input className="number-input" type="number" min="0" step="1" value={phase.endWeeksBeforeShip} onChange={event => updatePhase(phase.id, "endWeeksBeforeShip", Number(event.target.value))} /></td><td><select value={phase.allocation} onChange={event => updatePhase(phase.id, "allocation", event.target.value)}><option value="spread">Spread across phase</option><option value="shiftToStart">Shift to start</option><option value="shiftToEnd">Shift to end</option><option value="shiftToMidpoint">Shift to midpoint</option></select></td></tr>)}</tbody></table></div></div>
    ''' + route_table
          s = s.replace(route_table, phase_editor)
          s = s.replace('export default function AnalysisExplorer({ model, baseline, comparison, onBack, onContinue }: AnalysisExplorerProps)', 'export default function AnalysisExplorer({ model, baseline, comparison, onBack, onContinue, onModelChange, onRecalculate }: AnalysisExplorerProps)')
          old_chart = '<LineChart labels={aligned.map(point => point.baseline.label)} series={[{ label: "Baseline load", values: aligned.map(point => point.baseline.load), className: "baseline-load" }, { label: "Baseline capacity", values: aligned.map(point => point.baseline.capacity), className: "baseline-capacity" }, ...(overlay ? [{ label: "Recovery load", values: aligned.map(point => point.recovery?.load ?? null), className: "recovery-load" }, { label: "Recovery capacity", values: aligned.map(point => point.recovery?.capacity ?? null), className: "recovery-capacity" }] : [])]} />'
          new_chart = '<LoadCapacityComboChart labels={aligned.map(point => point.baseline.label)} baselineLoad={aligned.map(point => point.baseline.load)} baselineCapacity={aligned.map(point => point.baseline.capacity)} recoveryLoad={overlay ? aligned.map(point => point.recovery?.load ?? null) : undefined} recoveryCapacity={overlay ? aligned.map(point => point.recovery?.capacity ?? null) : undefined} />'
          s = s.replace(old_chart, new_chart)
          s = s.replace('<DemandExplorer model={model} scenarioId={baseline.demandSourceScenarioId ?? baseline.scenarioId} resolution={resolution} />', '<DemandExplorer model={model} scenarioId={baseline.demandSourceScenarioId ?? baseline.scenarioId} resolution={resolution} onModelChange={onModelChange} onRecalculate={onRecalculate} />')
          s = s.replace('<LeadTimeExplorer model={model} />', '<LeadTimeExplorer model={model} onModelChange={onModelChange} onRecalculate={onRecalculate} />')
          p.write_text(s)

          app = Path('platform/apps/web/src/App.tsx')
          a = app.read_text()
          a = a.replace('''  function updateRecoveryModel(next: CapacityModel): void {\n    setModel(next);\n    setComparison(null);\n  }''', '''  function updateRecoveryModel(next: CapacityModel): void {\n    setModel(next);\n    setComparison(null);\n  }\n\n  function updateAnalysisModel(next: CapacityModel): void {\n    setModel(next);\n    setComparison(null);\n  }\n\n  async function recalculateEditedModel(): Promise<void> {\n    if (!model) return;\n    setBusy("calculating");\n    setError(null);\n    try {\n      const checked = await validateModel(model);\n      setValidation(checked);\n      if (!checked.valid) throw new Error("Resolve the edited model validation issues before recalculating.");\n      setCalculation(await calculateModel(model, baselineScenarioId));\n      setComparison(null);\n    } finally {\n      setBusy(null);\n    }\n  }''')
          a = a.replace('<AnalysisExplorer model={model} baseline={calculation} comparison={comparison} onBack={() => setActiveStep("analysis")} onContinue={() => setActiveStep("recovery")} />', '<AnalysisExplorer model={model} baseline={calculation} comparison={comparison} onModelChange={updateAnalysisModel} onRecalculate={recalculateEditedModel} onBack={() => setActiveStep("analysis")} onContinue={() => setActiveStep("recovery")} />')
          app.write_text(a)

          css = Path('platform/apps/web/src/analysis-explorer.css')
          css.write_text(css.read_text() + r'''
.combo-load-bar.baseline,.demand-bar{fill:#5b9bd5}.combo-load-bar.recovery{fill:#ed7d31;opacity:.78}.combo-capacity-line{fill:none;stroke-width:3;stroke-linejoin:round;stroke-linecap:round}.combo-capacity-line.baseline,.combo-capacity-point.baseline{stroke:#17365d;fill:#17365d}.combo-capacity-line.recovery,.combo-capacity-point.recovery{stroke:#70ad47;fill:#70ad47}.combo-legend{display:inline-block;width:18px;height:4px}.combo-legend.baseline-load{background:#5b9bd5;height:10px}.combo-legend.recovery-load{background:#ed7d31;height:10px}.combo-legend.baseline-capacity{background:#17365d}.combo-legend.recovery-capacity{background:#70ad47}.editor-actions{display:flex;gap:8px;align-items:end}.demand-editor select,.demand-editor input,.leadtime-editor select,.leadtime-editor input{min-width:120px;width:100%;padding:6px 7px;border:1px solid #b8c6d5;background:#fff}.number-input{text-align:right}.demand-editor td,.leadtime-editor td{vertical-align:middle}@media(max-width:700px){.editor-actions{width:100%;justify-content:flex-end;flex-wrap:wrap}.demand-editor table,.leadtime-editor table{min-width:760px}}
''')
          PY
      - name: Commit focused changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add platform/apps/web/src/AnalysisExplorer.tsx platform/apps/web/src/App.tsx platform/apps/web/src/analysis-explorer.css
          git commit -m "feat(web): focused demand lead-time and chart controls [focused-patch]"
          git push origin HEAD:feature/focused-demand-leadtime-charts
