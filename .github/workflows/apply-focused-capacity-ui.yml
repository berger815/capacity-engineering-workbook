name: Apply focused capacity UI patch

on:
  push:
    branches:
      - feature/focused-demand-leadtime-charts

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[focused-patch]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/focused-demand-leadtime-charts
      - name: Apply focused UI changes
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('platform/apps/web/src/AnalysisExplorer.tsx')
          s = p.read_text()
          s = s.replace('  onContinue: () => void;\n}', '  onContinue: () => void;\n  onModelChange: (model: CapacityModel) => void;\n  onRecalculate: () => Promise<void>;\n}')
          marker = 'function GapBarChart({ labels, baseline, recovery }: { labels: string[]; baseline: number[]; recovery?: number[] }) {'
          combo = '''function LoadCapacityComboChart({ labels, load, capacity }: { labels: string[]; load: number[]; capacity: number[] }) {\n  const width=980,height=340,margin={top:24,right:28,bottom:58,left:72};\n  const plotWidth=width-margin.left-margin.right,plotHeight=height-margin.top-margin.bottom;\n  const maximum=Math.max(1,...load,...capacity)*1.08;\n  const y=(value:number)=>margin.top+plotHeight-value/maximum*plotHeight;\n  const group=plotWidth/Math.max(labels.length,1),bar=Math.max(5,Math.min(28,group*.55));\n  const x=(index:number)=>margin.left+group*index+group/2;\n  const path=capacity.map((value,index)=>`${index===0?"M":"L"}${x(index)},${y(value)}`).join(" ");\n  return <div className="chart-frame"><svg viewBox={`0 0 ${width} ${height}`} role="img" aria-label="Demand bars and capacity line by period">{[0,.25,.5,.75,1].map(f=><g key={f}><line className="chart-grid" x1={margin.left} x2={width-margin.right} y1={y(maximum*f)} y2={y(maximum*f)}/><text className="chart-axis-label" x={margin.left-10} y={y(maximum*f)+4} textAnchor="end">{formatNumber(maximum*f)}</text></g>)}{load.map((value,index)=><rect key={index} className="demand-bar" x={x(index)-bar/2} y={y(value)} width={bar} height={Math.max(1,margin.top+plotHeight-y(value))}><title>{`${labels[index]} · Demand/load: ${formatNumber(value)}`}</title></rect>)}<path d={path} className="combo-capacity-line baseline"/>{capacity.map((value,index)=><circle key={index} className="combo-capacity-point baseline" cx={x(index)} cy={y(value)} r="3"/>)}{labels.map((label,index)=><text key={label} className="chart-x-label" x={x(index)} y={height-22} textAnchor="middle">{label}</text>)}</svg><div className="chart-legend"><span><i className="combo-legend baseline-load"/>Demand / load</span><span><i className="combo-legend baseline-capacity"/>Available capacity</span></div></div>;\n}\n\n'''
          s=s.replace(marker,combo+marker)
          s=s.replace('function DemandExplorer({ model, scenarioId, resolution }: { model: CapacityModel; scenarioId: string; resolution: ExploreResolution }) {','function DemandExplorer({ model, scenarioId, resolution, onModelChange, onRecalculate }: { model: CapacityModel; scenarioId: string; resolution: ExploreResolution; onModelChange: (model: CapacityModel) => void; onRecalculate: () => Promise<void> }) {\n  const [dirty, setDirty] = useState(false);')
          s=s.replace('  return <>\n    <div className="explorer-subfilters"><label>Product<select value={productId}', '  function updateDemand(id: string, field: "productId" | "shipDate" | "quantity", value: string | number) { onModelChange({ ...model, demand: model.demand.map(record => record.id === id ? { ...record, [field]: value } : record) }); setDirty(true); }\n  return <>\n    <div className="explorer-subfilters"><label>Product<select value={productId}',1)
          old='''    <div className="analysis-card wide"><div className="analysis-card-heading"><div><h3>Shipment demand profile</h3><p>Demand is shown at ship date. Capacity charts shift applicable work into earlier lead-time periods.</p></div></div><LineChart labels={points.map(point => point.label)} series={[{ label: "Ship quantity", values: points.map(point => point.quantity), className: "demand-line" }]} valueFormatter={value => value.toFixed(0)} /></div>'''
          new=old+'''\n    <div className="table-card demand-editor"><div className="card-title-row"><div><h3>Imported demand detail</h3><small>Modify product, ship date, or quantity, then recalculate.</small></div><button className="primary" type="button" disabled={!dirty} onClick={() => void onRecalculate().then(() => setDirty(false))}>Apply and recalculate</button></div><div className="table-wrap"><table><thead><tr><th>Product</th><th>Ship date</th><th className="number">Quantity</th><th>Class</th></tr></thead><tbody>{records.map(record => <tr key={record.id}><td><select value={record.productId} onChange={event => updateDemand(record.id,"productId",event.target.value)}>{model.products.map(product => <option key={product.id} value={product.id}>{product.name}</option>)}</select></td><td><input type="date" value={record.shipDate} onChange={event => updateDemand(record.id,"shipDate",event.target.value)}/></td><td><input className="number-input" type="number" min="0" value={record.quantity} onChange={event => updateDemand(record.id,"quantity",Number(event.target.value))}/></td><td>{record.demandClass ?? "forecast"}</td></tr>)}</tbody></table></div></div>'''
          s=s.replace(old,new)
          s=s.replace('function LeadTimeExplorer({ model }: { model: CapacityModel }) {','function LeadTimeExplorer({ model, onModelChange, onRecalculate }: { model: CapacityModel; onModelChange: (model: CapacityModel) => void; onRecalculate: () => Promise<void> }) {\n  const [dirty, setDirty] = useState(false);')
          marker2='  const resourceNames = Object.fromEntries(model.resourceGroups.map(group => [group.id, group.name]));\n'
          s=s.replace(marker2,marker2+'  function updatePhase(phaseId: string, field: "name" | "startWeeksBeforeShip" | "endWeeksBeforeShip" | "allocation", value: string | number) { onModelChange({ ...model, routingRevisions: model.routingRevisions.map(item => item.id === revision.id ? { ...item, phases: item.phases.map(phase => phase.id === phaseId ? { ...phase, [field]: value } : phase) } : item) }); setDirty(true); }\n')
          route='<div className="table-card route-table"><div className="card-title-row"><div><h3>Routing and resource detail</h3><small>Operations are sparse; only applicable resources appear.</small></div></div>'
          editor='''<div className="table-card leadtime-editor"><div className="card-title-row"><div><h3>Lead-time phase settings</h3><small>Adjust weeks-before-ship and allocation, then recalculate.</small></div><button className="primary" type="button" disabled={!dirty} onClick={() => void onRecalculate().then(() => setDirty(false))}>Apply and recalculate</button></div><div className="table-wrap"><table><thead><tr><th>Phase</th><th>Start weeks</th><th>End weeks</th><th>Allocation</th></tr></thead><tbody>{phases.map(phase => <tr key={phase.id}><td><input value={phase.name} onChange={event => updatePhase(phase.id,"name",event.target.value)}/></td><td><input className="number-input" type="number" min="0" value={phase.startWeeksBeforeShip} onChange={event => updatePhase(phase.id,"startWeeksBeforeShip",Number(event.target.value))}/></td><td><input className="number-input" type="number" min="0" value={phase.endWeeksBeforeShip} onChange={event => updatePhase(phase.id,"endWeeksBeforeShip",Number(event.target.value))}/></td><td><select value={phase.allocation} onChange={event => updatePhase(phase.id,"allocation",event.target.value)}><option value="spread">Spread</option><option value="shiftToStart">Shift to start</option><option value="shiftToEnd">Shift to end</option><option value="shiftToMidpoint">Shift to midpoint</option></select></td></tr>)}</tbody></table></div></div>\n    '''+route
          s=s.replace(route,editor)
          s=s.replace('export default function AnalysisExplorer({ model, baseline, comparison, onBack, onContinue }: AnalysisExplorerProps)','export default function AnalysisExplorer({ model, baseline, comparison, onBack, onContinue, onModelChange, onRecalculate }: AnalysisExplorerProps)')
          oldchart='<LineChart labels={aligned.map(point => point.baseline.label)} series={[{ label: "Baseline load", values: aligned.map(point => point.baseline.load), className: "baseline-load" }, { label: "Baseline capacity", values: aligned.map(point => point.baseline.capacity), className: "baseline-capacity" }, ...(overlay ? [{ label: "Recovery load", values: aligned.map(point => point.recovery?.load ?? null), className: "recovery-load" }, { label: "Recovery capacity", values: aligned.map(point => point.recovery?.capacity ?? null), className: "recovery-capacity" }] : [])]} />'
          s=s.replace(oldchart,'<LoadCapacityComboChart labels={aligned.map(point => point.baseline.label)} load={aligned.map(point => overlay && point.recovery ? point.recovery.load : point.baseline.load)} capacity={aligned.map(point => overlay && point.recovery ? point.recovery.capacity : point.baseline.capacity)} />')
          s=s.replace('<DemandExplorer model={model} scenarioId={baseline.demandSourceScenarioId ?? baseline.scenarioId} resolution={resolution} />','<DemandExplorer model={model} scenarioId={baseline.demandSourceScenarioId ?? baseline.scenarioId} resolution={resolution} onModelChange={onModelChange} onRecalculate={onRecalculate} />')
          s=s.replace('<LeadTimeExplorer model={model} />','<LeadTimeExplorer model={model} onModelChange={onModelChange} onRecalculate={onRecalculate} />')
          p.write_text(s)
          app=Path('platform/apps/web/src/App.tsx'); a=app.read_text()
          a=a.replace('  function updateRecoveryModel(next: CapacityModel): void {\n    setModel(next);\n    setComparison(null);\n  }','  function updateRecoveryModel(next: CapacityModel): void {\n    setModel(next);\n    setComparison(null);\n  }\n\n  function updateAnalysisModel(next: CapacityModel): void { setModel(next); setComparison(null); }\n  async function recalculateEditedModel(): Promise<void> { if (!model) return; const checked = await validateModel(model); setValidation(checked); if (!checked.valid) throw new Error("Edited model has validation issues."); setCalculation(await calculateModel(model, baselineScenarioId)); setComparison(null); }')
          a=a.replace('<AnalysisExplorer model={model} baseline={calculation} comparison={comparison} onBack={() => setActiveStep("analysis")} onContinue={() => setActiveStep("recovery")} />','<AnalysisExplorer model={model} baseline={calculation} comparison={comparison} onModelChange={updateAnalysisModel} onRecalculate={recalculateEditedModel} onBack={() => setActiveStep("analysis")} onContinue={() => setActiveStep("recovery")} />')
          app.write_text(a)
          css=Path('platform/apps/web/src/analysis-explorer.css'); css.write_text(css.read_text()+'\n.demand-bar{fill:#5b9bd5}.combo-capacity-line{fill:none;stroke:#17365d;stroke-width:3}.combo-capacity-point{fill:#17365d;stroke:#17365d}.combo-legend.baseline-load{background:#5b9bd5;height:10px}.combo-legend.baseline-capacity{background:#17365d;height:4px}.demand-editor input,.demand-editor select,.leadtime-editor input,.leadtime-editor select{width:100%;min-width:110px;padding:6px;border:1px solid #b8c6d5}.number-input{text-align:right}\n')
          PY
      - name: Commit focused changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add platform/apps/web/src/AnalysisExplorer.tsx platform/apps/web/src/App.tsx platform/apps/web/src/analysis-explorer.css
          git commit -m "feat(web): focused demand lead-time and chart controls [focused-patch]"
          git push origin HEAD:feature/focused-demand-leadtime-charts
