name: Platform CI

on:
  pull_request:
    paths:
      - "platform/**"
      - ".github/workflows/platform-ci.yml"
  push:
    branches:
      - "platform/**"
    paths:
      - "platform/**"
      - ".github/workflows/platform-ci.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Enable pnpm
        run: corepack enable
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: platform/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Build
        run: pnpm build
      - name: Test
        run: pnpm test
