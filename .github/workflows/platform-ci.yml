name: Platform CI

on:
  pull_request:
    paths:
      - "platform/**"
      - ".github/workflows/platform-ci.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: capacity_assurance_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d capacity_assurance_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: platform
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Enable pnpm
        run: corepack enable
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply database migrations
        env:
          PGPASSWORD: postgres
        run: |
          for migration in database/migrations/*.sql; do
            echo "Applying ${migration}"
            psql --host 127.0.0.1 --username postgres --dbname capacity_assurance_test --set ON_ERROR_STOP=1 --file "${migration}"
          done
      - name: Build
        run: pnpm build
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        shell: bash
        run: |
          set -o pipefail
          pnpm test 2>&1 | tee /tmp/enterprise-test-output.log
      - name: Upload reconciliation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-reconciliation-diagnostics
          path: |
            /tmp/enterprise-test-output.log
            platform/packages/engine/src/index.ts
            platform/packages/domain/src/schema.ts
          if-no-files-found: warn
