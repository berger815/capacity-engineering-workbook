name: Deploy Assessment Studio to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "platform/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
      - name: Enable pnpm
        run: corepack enable
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        working-directory: platform
        run: pnpm install --no-frozen-lockfile
      - name: Build local assessment application
        working-directory: platform
        run: pnpm build
        env:
          VITE_LOCAL_ASSESSMENT: "true"
          VITE_BASE_PATH: "/capacity-engineering-workbook/"
      - name: Preserve the legacy workbook
        run: |
          if [ ! -f legacy/capacity-workbook-v6.86.html ]; then
            mkdir -p legacy
            cp index.html legacy/capacity-workbook-v6.86.html
          fi
      - name: Publish generated files to main
        run: |
          rm -rf assets
          cp platform/apps/web/dist/index.html ./index.html
          cp -R platform/apps/web/dist/assets ./assets
          touch .nojekyll
      - name: Commit generated Pages build
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets .nojekyll legacy/capacity-workbook-v6.86.html
          if git diff --cached --quiet; then
            echo "Pages build is already current."
          else
            git commit -m "build(pages): publish Assessment Studio [skip ci]"
            git push origin main
          fi
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: platform/apps/web/dist

  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
